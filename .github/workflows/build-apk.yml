name: Build APK

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Compute version code
        id: ver
        run: echo "vc=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Build Debug APK
        run: gradle :app:assembleDebug -PversionCode=${{ steps.ver.outputs.vc }} -PversionName=1.0.${{ steps.ver.outputs.vc }} --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: marhaba-grill-tv-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish GitHub Release (enables OTA updates)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.vc }}
          name: Build ${{ steps.ver.outputs.vc }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
